<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>BrainGain</title>

        <!--CSS-->
        <link rel="stylesheet" href="styles.css">

        <!--PWA-->
        <link rel="manifest" href="manifest.json">  
    </head>
    <body>
        <header class="header">
            <img src="images/logo.png" class="logo-img" alt="BrainGain logo">
        </header>

    

        <main class="container">

            <section class="card">
            <h2>Memory Game</h2>
            <p>Flip cards and find matching pairs.</p>
            <a href="memory/memory.html" class="play-btn">Play</a>
        </section>

        <section class="card">
            <h2>Simon Game</h2>
            <p>Repeat the sequence correctly.</p>
            <a href="simon/simon.html" class="play-btn">Play</a>
        </section>

        <section class="card">
            <h2>Sudoku</h2>
            <p>Fill the grid following Sudoku rules.</p>
            <a href="sudoku/sudoku.html" class="play-btn">Play</a>
        </section>

        </main>

        <footer class="footer">
            <p>BrainGain</p>
        </footer>

        <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js');
        }
        </script>


        <script>
        window.addEventListener('load', () => {
            document.body.classList.add('loaded');
        });    
        </script>

    </body>
</html>
